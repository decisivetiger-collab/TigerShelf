name: Deploy TigerShelf Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expand mobile runtime
        run: |
          python - <<'PY'
          import base64
          import zlib
          from pathlib import Path

          def expand(payload):
              data = base64.b64decode(payload)
              return zlib.decompress(data[10:-8], -zlib.MAX_WBITS).decode('utf-8')

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          style_chunks = sorted(Path('.').glob('styles-*.b64'))
          app_chunks = sorted(Path('.').glob('app-*.b64'))
          if not style_chunks or not app_chunks:
              raise RuntimeError('Missing TigerShelf deployment chunks.')
          styles = expand(''.join(path.read_text(encoding='ascii') for path in style_chunks))
          app = expand(''.join(path.read_text(encoding='ascii') for path in app_chunks))
          start = text.index('    <script type="module">')
          end = text.index('    </script>', start) + len('    </script>')
          expanded = f'    <style>\n{styles}\n    </style>\n    <script>\n{app}\n    </script>'
          path.write_text(text[:start] + expanded + text[end:], encoding='utf-8')
          PY
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
